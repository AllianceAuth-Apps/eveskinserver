[flake8]
exclude = .git, *migrations*, .tox, dist, htmlcov
max-line-length = 88
select = C,E,F,W,B,B950
ignore = E203, E231, E501, W503, W291, W293

[tox]
envlist = py312, pylint

[testenv]
extras =
    test

commands=
    coverage run -m unittest discover -v
    coverage report

[testenv:pylint]
deps=
    pylint

commands=
    pylint eveskinserver
